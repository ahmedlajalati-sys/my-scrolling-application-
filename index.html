<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scrolling.app - Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="header-title">Scrolling.app</div>
            <div class="header-icons">
                <button class="icon-btn" onclick="location.href='messages.html'">
                    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </button>
                <button class="icon-btn" onclick="location.href='settings.html'">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
            </div>
        </div>

        <!-- Stories Row -->
        <div class="stories-row" id="storiesContainer"></div>

        <!-- Feed -->
        <div class="feed" id="feedContainer"></div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-btn active" onclick="location.href='index.html'">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Home</span>
            </button>
            <button class="nav-btn" onclick="location.href='reels.html'">
                <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
                <span>Reels</span>
            </button>
            <button class="nav-btn" id="createPostBtn">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span>Create</span>
            </button>
            <button class="nav-btn" onclick="location.href='profile.html'">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></svg>
                <span>Profile</span>
            </button>
        </div>
    </div>

    <!-- Create Post Modal -->
    <div id="postModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create new post</h3>
                <button class="close-modal" onclick="closeModal()">×</button>
            </div>
            <div class="post-type-selector">
                <button class="post-type-btn active" data-type="image">📷 Photo</button>
                <button class="post-type-btn" data-type="video">🎬 Reel</button>
            </div>
            <div id="uploadZone" class="upload-zone">
                📸 Tap to select image or video
            </div>
            <input type="file" id="fileInput" accept="image/*,video/*" style="display:none">
            <div class="music-selector" id="musicSelector" style="display:none">
                <input type="text" id="musicSearch" placeholder="Search for music...">
                <div id="musicResults"></div>
            </div>
            <textarea id="captionInput" rows="3" placeholder="Write a caption..."></textarea>
            <button id="publishPostBtn" class="btn-primary">Share</button>
        </div>
    </div>

    <!-- Story Viewer Modal -->
    <div id="storyViewer" class="story-viewer">
        <div class="story-viewer-header">
            <button class="close-story" onclick="closeStoryViewer()">✕</button>
        </div>
        <div class="story-viewer-content" id="storyViewerContent"></div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="stories.js"></script>
    <script src="posts.js"></script>
    <script src="music.js"></script>
    <script src="script.js"></script>
</body>
</html>
