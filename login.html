<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scrolling.app - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px 28px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subtitle {
            color: #666;
            margin-bottom: 28px;
            font-size: 14px;
        }
        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 14px;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
        }
        .input-field:focus {
            border-color: #667eea;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #ddd;
            color: #333;
        }
        .divider {
            text-align: center;
            color: #999;
            margin: 20px 0;
            position: relative;
        }
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #ddd;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .toggle-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            cursor: pointer;
        }
        .toggle-link span {
            color: #667eea;
            font-weight: bold;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">✨ Scrolling.app ✨</div>
        <div class="subtitle">Connect & Share with the world</div>
        
        <input type="text" id="loginUsername" class="input-field" placeholder="Username">
        <input type="email" id="loginEmail" class="input-field" placeholder="Email">
        <input type="password" id="loginPassword" class="input-field" placeholder="Password">
        
        <button id="loginBtn" class="btn-primary">🚀 Login</button>
        
        <div class="divider">OR</div>
        
        <button id="googleBtn" class="btn-primary btn-outline">🌐 Continue with Google</button>
        
        <div class="toggle-link" id="toggleAuth">
            <span>➕ Create New Account</span>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Toast function
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // Users database
        let users = JSON.parse(localStorage.getItem('scrolling_users') || '{}');
        
        // Add demo user if empty
        if (Object.keys(users).length === 0) {
            users['test'] = { password: '123', email: 'test@test.com', name: 'Test User' };
            users['jorge'] = { password: '123', email: 'jorgeganmaster@gmail.com', name: 'Jorge' };
            localStorage.setItem('scrolling_users', JSON.stringify(users));
        }

        let isSignup = false;

        document.getElementById('loginBtn').onclick = () => {
            const username = document.getElementById('loginUsername').value.trim();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !email || !password) {
                showToast('All fields are required');
                return;
            }

            if (isSignup) {
                // Sign up
                if (users[username]) {
                    showToast('Username already exists');
                    return;
                }
                users[username] = { password, email, name: username };
                localStorage.setItem('scrolling_users', JSON.stringify(users));
                localStorage.setItem('currentUser', username);
                showToast('✅ Account created! Welcome!');
                window.location.href = '/index.html';
            } else {
                // Login
                if (users[username] && users[username].password === password) {
                    localStorage.setItem('currentUser', username);
                    showToast('✅ Login successful!');
                    window.location.href = '/index.html';
                } else {
                    showToast('❌ Invalid username or password');
                }
            }
        };

        document.getElementById('toggleAuth').onclick = () => {
            isSignup = !isSignup;
            document.getElementById('loginBtn').innerText = isSignup ? 'Sign Up' : 'Login';
            document.getElementById('toggleAuth').innerHTML = isSignup ? 
                '<span>🔐 Already have an account? Login</span>' : 
                '<span>➕ Create New Account</span>';
        };

        document.getElementById('googleBtn').onclick = () => {
            showToast('Google login coming soon!');
        };
    </script>
</body>
</html>
