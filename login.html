<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scrolling.app - Login</title>
    <link rel="stylesheet" href="/style.css">
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .login-card {
        background: white;
        border-radius: 32px;
        padding: 40px 28px;
        width: 350px;
        text-align: center;
    }
    .logo { font-size: 32px; font-weight: bold; margin-bottom: 8px; }
    .input-field {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 14px;
    }
    .btn-primary {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 14px;
        cursor: pointer;
    }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">✨ Scrolling.app ✨</div>
            <div class="subtitle">Connect & Share with the world</div>
            
            <select id="languageSelect" class="language-select">
                <option value="en">English</option>
                <option value="ar">العربية</option>
                <option value="fr">Français</option>
                <option value="es">Español</option>
                <option value="de">Deutsch</option>
                <option value="it">Italiano</option>
                <option value="pt">Português</option>
                <option value="ru">Русский</option>
                <option value="tr">Türkçe</option>
                <option value="fa">فارسی</option>
                <option value="ur">اردو</option>
                <option value="hi">हिन्दी</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="zh">中文</option>
                <option value="nl">Nederlands</option>
                <option value="pl">Polski</option>
                <option value="sv">Svenska</option>
                <option value="da">Dansk</option>
                <option value="no">Norsk</option>
                <option value="fi">Suomi</option>
                <option value="el">Ελληνικά</option>
                <option value="cs">Čeština</option>
                <option value="hu">Magyar</option>
                <option value="ro">Română</option>
                <option value="th">ไทย</option>
                <option value="vi">Tiếng Việt</option>
            </select>
            
            <input type="text" id="loginUsername" class="input-field" placeholder="Username">
            <input type="email" id="loginEmail" class="input-field" placeholder="Email">
            <input type="password" id="loginPassword" class="input-field" placeholder="Password">
            
            <button id="loginBtn" class="btn-primary">🚀 Login</button>
            
            <div class="divider">OR</div>
            
            <button id="googleBtn" class="btn-primary btn-outline">🌐 Continue with Google</button>
            
            <div class="toggle-link" id="toggleAuth">
                <span>➕ Create New Account</span>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
